<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국어 TTS 테스트 베드 (TTS Testing Bed)</title>
    <meta name="description" content="한국어 TTS 태그 및 효과를 테스트할 수 있는 플레이그라운드입니다.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <i data-lucide="waveform"></i>
            <span>TTS Playground</span>
        </div>
        <nav class="main-nav">
            <button id="nav-showcase-kr" class="active">Showcase KR</button>
            <button id="nav-showcase-en">Showcase EN</button>
            <button id="nav-showcase-jp">Showcase JP</button>
            <button id="nav-editor">Editor</button>
        </nav>
        <div class="header-actions">
            <button id="theme-toggle" aria-label="테마 전환">
                <i data-lucide="moon"></i>
            </button>
        </div>
    </header>

    <main class="app-content">
        <!-- Showcase Section -->
        <section id="section-showcase" class="content-section">
            <div class="section-header">
                <h1>음성 효과 쇼케이스</h1>
                <p>특정 태그가 한국어 음성 출력에 어떤 영향을 미치는지 확인하세요.</p>
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">전체</button>
                    <button class="filter-btn" data-filter="non-speech">비음성 효과</button>
                    <button class="filter-btn" data-filter="style">어조/스타일</button>
                    <button class="filter-btn" data-filter="pacing">간격/속도</button>
                </div>
            </div>

            <div class="showcase-settings">
                <div class="form-group">
                    <label for="showcase-model-select">보이스 모델</label>
                    <select id="showcase-model-select">
                        <option value="gemini-3.1-flash-tts-preview">Gemini 3.1 Flash TTS (Preview)</option>
                        <option value="gemini-2.5-flash-tts">Gemini 2.5 Flash TTS</option>
                        <option value="gemini-2.5-flash-lite-preview-tts">Gemini 2.5 Flash Lite TTS (Preview)</option>
                        <option value="gemini-2.5-pro-tts">Gemini 2.5 Pro TTS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="showcase-voice-select">목소리</label>
                    <select id="showcase-voice-select">
                        <option value="Kore">Kore (여성)</option>
                        <option value="Charon">Charon (남성)</option>
                        <option value="Achernar">Achernar (여성)</option>
                        <option value="Aoede">Aoede (여성)</option>
                        <option value="Sirius">Sirius (남성)</option>
                        <option value="Enceladus">Enceladus (남성)</option>
                        <option value="Fenrir">Fenrir (남성)</option>
                    </select>
                </div>
            </div>

            <div id="showcase-gallery" class="showcase-grid">
                <!-- Cards will be dynamically inserted here -->
            </div>
        </section>

        <!-- Editor Section (Hidden by default) -->
        <section id="section-editor" class="content-section hidden">
            <div class="section-header">
                <h1>인터랙티브 태그 에디터</h1>
                <p>텍스트에 태그를 삽입하여 나만의 음성을 생성해보세요.</p>
            </div>

            <div class="editor-layout">
                <div class="editor-main">
                    <div class="editor-container">
                        <div class="editor-toolbar">
                            <div class="category-filter">
                                <button class="filter-btn active" data-filter="all">전체</button>
                                <button class="filter-btn" data-filter="non-speech">비음성</button>
                                <button class="filter-btn" data-filter="style">스타일</button>
                                <button class="filter-btn" data-filter="pacing">간격</button>
                            </div>
                            <div class="tags-container">
                                <!-- Tag buttons will be inserted here dynamically -->
                            </div>
                        </div>
                        <textarea id="tts-input" placeholder="텍스트를 입력하세요. 태그를 입력하려면 '[' 를 입력하세요."></textarea>
                        <div id="autocomplete-list" class="autocomplete-items hidden"></div>
                    </div>
                    <div class="editor-actions">
                        <button id="generate-btn" class="primary-btn">
                            <i data-lucide="sparkles"></i>
                            <span>음성 생성</span>
                        </button>
                    </div>
                </div>

                <div class="editor-sidebar">
                    <div class="sidebar-block">
                        <h3>음성 설정</h3>
                        <div class="form-group">
                            <label for="language-select">언어</label>
                            <select id="language-select">
                                <option value="ko-KR">한국어</option>
                                <option value="en-US">영어</option>
                                <option value="ja-JP">일본어</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="model-select">보이스 모델</label>
                            <select id="model-select">
                                <option value="gemini-3.1-flash-tts-preview">Gemini 3.1 Flash TTS (Preview)</option>
                                <option value="gemini-2.5-flash-tts">Gemini 2.5 Flash TTS</option>
                                <option value="gemini-2.5-flash-lite-preview-tts">Gemini 2.5 Flash Lite TTS (Preview)</option>
                                <option value="gemini-2.5-pro-tts">Gemini 2.5 Pro TTS</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="voice-select">목소리</label>
                            <select id="voice-select">
                                <option value="Kore">Kore (여성)</option>
                                <option value="Charon">Charon (남성)</option>
                                <option value="Achernar">Achernar (여성)</option>
                                <option value="Aoede">Aoede (여성)</option>
                                <option value="Sirius">Sirius (남성)</option>
                                <option value="Enceladus">Enceladus (남성)</option>
                                <option value="Fenrir">Fenrir (남성)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="speed-range">속도</label>
                            <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.0">
                            <span id="speed-value">1.0x</span>
                        </div>
                    </div>

                    <div class="sidebar-block">
                        <h3>원시 출력 (Raw Output)</h3>
                        <pre id="raw-output-preview">... API로 전송될 텍스트가 표시됩니다 ...</pre>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 TTS Playground. All rights reserved.</p>
    </footer>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
    <script src="tags_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
